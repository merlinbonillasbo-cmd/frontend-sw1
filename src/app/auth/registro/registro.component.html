<!-- src/app/auth/registro/registro.component.html -->
<div class="min-h-screen bg-slate-950 flex items-center justify-center px-4 py-12">

  <!-- Background grid -->
  <div class="absolute inset-0 bg-[linear-gradient(rgba(14,165,233,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(14,165,233,0.03)_1px,transparent_1px)] bg-[size:64px_64px] pointer-events-none"></div>

  <div class="relative w-full max-w-md">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2.5 mb-8">
      <div class="w-10 h-10 rounded-xl bg-sky-500/20 flex items-center justify-center border border-sky-500/40">
        <svg class="w-6 h-6 text-sky-400" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/>
          <circle cx="6" cy="12" r="3"/>
          <circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </div>
      <span class="text-white font-bold text-2xl tracking-tight">WorkflowPro</span>
    </div>

    <!-- Card -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl shadow-black/40">

      <!-- Admin badge -->
      <div class="flex items-center justify-center mb-6">
        <span class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full
          bg-sky-500/10 border border-sky-500/30 text-sky-400 text-xs font-semibold uppercase tracking-wide">
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 1a4.5 4.5 0 00-4.5 4.5V9H5a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2v-6a2 2 0 00-2-2h-.5V5.5A4.5 4.5 0 0010 1zm3 8V5.5a3 3 0 10-6 0V9h6z" clip-rule="evenodd"/>
          </svg>
          Serás el Administrador del sistema
        </span>
      </div>

      <h1 class="text-2xl font-bold text-white text-center mb-1">Crear cuenta</h1>
      <p class="text-slate-400 text-sm text-center mb-6">Configura el primer acceso al sistema</p>

      <!-- Error -->
      @if (errorMsg()) {
        <div class="mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm">
          {{ errorMsg() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate>

        <!-- Nombre completo -->
        <div class="mb-4">
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Nombre completo</label>
          <input
            type="text"
            name="nombreCompleto"
            [(ngModel)]="form.nombreCompleto"
            required
            placeholder="Ej: Juan Pérez"
            class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-2.5
              placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500
              transition-all duration-200 text-sm"
          />
        </div>

        <!-- Correo -->
        <div class="mb-4">
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Correo electrónico</label>
          <input
            type="email"
            name="correo"
            [(ngModel)]="form.correo"
            required
            placeholder="admin@empresa.com"
            class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-2.5
              placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500
              transition-all duration-200 text-sm"
          />
        </div>

        <!-- Usuario -->
        <div class="mb-4">
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Nombre de usuario</label>
          <input
            type="text"
            name="nombreUsuario"
            [(ngModel)]="form.nombreUsuario"
            required
            placeholder="admin"
            class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-2.5
              placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500
              transition-all duration-200 text-sm"
          />
        </div>

        <!-- Nombre empresa -->
        <div class="mb-4">
          <label class="block text-slate-300 text-sm font-medium mb-1.5">
            Nombre de la empresa / agencia
          </label>
          <input
            type="text"
            name="nombreEmpresa"
            [(ngModel)]="form.nombreEmpresa"
            required
            placeholder="Ej: Empresa S.A."
            class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-2.5
              placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500
              transition-all duration-200 text-sm"
          />
        </div>

        <!-- Contraseña -->
        <div class="mb-4">
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Contraseña</label>
          <div class="relative">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              name="contrasena"
              [(ngModel)]="form.contrasena"
              required
              minlength="8"
              placeholder="Mínimo 8 caracteres"
              class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-2.5 pr-10
                placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500
                transition-all duration-200 text-sm"
            />
            <button type="button" (click)="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-sky-400 transition-colors">
              @if (showPassword()) {
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
                </svg>
              } @else {
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <!-- Confirmar contraseña -->
        <div class="mb-6">
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Confirmar contraseña</label>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            name="confirmarContrasena"
            [(ngModel)]="form.confirmarContrasena"
            required
            placeholder="Repite la contraseña"
            class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-2.5
              placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500
              transition-all duration-200 text-sm"
          />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading() || !f.valid"
          class="w-full flex items-center justify-center gap-2 px-6 py-3 bg-sky-500 hover:bg-sky-400
            disabled:bg-sky-500/40 disabled:cursor-not-allowed text-white font-semibold rounded-xl
            transition-all duration-200 shadow-lg shadow-sky-500/25 active:scale-95">
          @if (loading()) {
            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            Creando cuenta...
          } @else {
            Crear cuenta de Administrador
          }
        </button>

      </form>

      <p class="text-center text-slate-500 text-sm mt-5">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="text-sky-400 hover:text-sky-300 transition-colors font-medium ml-1">
          Inicia sesión
        </a>
      </p>

    </div>
  </div>
</div>
