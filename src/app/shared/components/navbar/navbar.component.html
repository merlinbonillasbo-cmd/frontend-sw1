<!-- src/app/shared/components/navbar/navbar.component.html -->
<nav [class.scrolled]="isScrolled()" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <button (click)="scrollTo('hero')" class="flex items-center gap-2.5 cursor-pointer">
        <div class="w-8 h-8 rounded-lg bg-sky-500/20 flex items-center justify-center border border-sky-500/40">
          <svg class="w-5 h-5 text-sky-400" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </div>
        <span class="text-white font-bold text-xl tracking-tight">WorkflowPro</span>
      </button>

      <!-- Desktop Nav Links -->
      <div class="hidden md:flex items-center gap-8">
        <button (click)="scrollTo('features')"
          class="text-slate-400 hover:text-sky-400 transition-colors duration-200 text-sm font-medium">
          Características
        </button>
        <button (click)="scrollTo('how-it-works')"
          class="text-slate-400 hover:text-sky-400 transition-colors duration-200 text-sm font-medium">
          Cómo funciona
        </button>
        <button (click)="scrollTo('pricing')"
          class="text-slate-400 hover:text-sky-400 transition-colors duration-200 text-sm font-medium">
          Precios
        </button>
        <button (click)="scrollTo('contact')"
          class="text-slate-400 hover:text-sky-400 transition-colors duration-200 text-sm font-medium">
          Contacto
        </button>
      </div>

      <!-- Desktop Buttons -->
      <div class="hidden md:flex items-center gap-3">
        <a routerLink="/login" class="px-4 py-2 text-sm font-medium text-sky-400 border border-sky-500/50 rounded-lg
          hover:border-sky-400 hover:bg-sky-400/5 transition-all duration-200">
          Iniciar sesión
        </a>
        <a routerLink="/registro" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg
          hover:bg-blue-500 active:scale-95 transition-all duration-200 shadow-lg shadow-blue-500/20">
          Registrarse
        </a>
      </div>

      <!-- Mobile Menu Toggle -->
      <button (click)="toggleMobileMenu()"
        class="md:hidden p-2 text-slate-400 hover:text-white transition-colors rounded-lg hover:bg-slate-800">
        @if (!mobileMenuOpen()) {
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        } @else {
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        }
      </button>
    </div>

    <!-- Mobile Menu -->
    @if (mobileMenuOpen()) {
      <div class="md:hidden border-t border-slate-800 py-4 space-y-1">
        <button (click)="scrollTo('features')"
          class="block w-full text-left px-3 py-2.5 text-slate-400 hover:text-sky-400
          hover:bg-slate-800/50 rounded-lg text-sm transition-colors">Características</button>
        <button (click)="scrollTo('how-it-works')"
          class="block w-full text-left px-3 py-2.5 text-slate-400 hover:text-sky-400
          hover:bg-slate-800/50 rounded-lg text-sm transition-colors">Cómo funciona</button>
        <button (click)="scrollTo('pricing')"
          class="block w-full text-left px-3 py-2.5 text-slate-400 hover:text-sky-400
          hover:bg-slate-800/50 rounded-lg text-sm transition-colors">Precios</button>
        <button (click)="scrollTo('contact')"
          class="block w-full text-left px-3 py-2.5 text-slate-400 hover:text-sky-400
          hover:bg-slate-800/50 rounded-lg text-sm transition-colors">Contacto</button>
        <div class="flex gap-3 pt-3 px-3">
          <a routerLink="/login" class="flex-1 py-2 text-sm text-center text-sky-400 border border-sky-500/50 rounded-lg
            hover:bg-sky-400/5 transition-all">Iniciar sesión</a>
          <a routerLink="/registro" class="flex-1 py-2 text-sm text-center text-white bg-blue-600 rounded-lg
            hover:bg-blue-500 transition-all">Registrarse</a>
        </div>
      </div>
    }
  </div>
</nav>
